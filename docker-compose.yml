services:
  postgres:
    image: postgres:16-alpine
    container_name: mankosathi-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mankosathi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mankosathi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mankosathi}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
